<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone Number Validator</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 600px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #f9f9f9;
    }
    h1 {
      color: #2c3e50;
      border-bottom: 2px solid #3498db;
      padding-bottom: 0.5rem;
    }
    form {
      background: white;
      padding: 1.5rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    input {
      flex: 1;
      min-width: 200px;
      padding: 0.6rem 1rem;
      font-size: 1rem;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    button {
      padding: 0.6rem 1.5rem;
      font-size: 1rem;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) {
      background: #2980b9;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #result {
      margin-top: 1.5rem;
      background: white;
      padding: 1rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .valid { color: #27ae60; font-weight: bold; }
    .invalid { color: #e74c3c; font-weight: bold; }
    .info { color: #2c3e50; }
    .error { color: #e67e22; }
    .flag { font-size: 1.5rem; margin-right: 0.3rem; }
    .loading { color: #3498db; }
  </style>
</head>
<body>
  <h1>📞 Phone Number Validator</h1>
  <form id="phoneForm">
    <input type="text" id="phoneInput" placeholder="e.g. +254703903056" required>
    <button type="submit" id="submitBtn">Validate</button>
  </form>
  <div id="result">Enter a number and click Validate.</div>

  <!-- External script – now allowed by CSP -->
  <script src="/script.js"></script>
</body>
</html>
