<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone Number Validator</title>
  
  <!-- Favicon (your favicon.png in public/) -->
  <link rel="icon" type="image/png" href="/favicon.png">

  <style>
    /* ---------- Global reset & base ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .container {
      max-width: 600px;
      width: 100%;
      background: white;
      border-radius: 20px;
      padding: 2rem 2rem 2.5rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      transition: transform 0.2s;
    }

    .container:hover {
      transform: translateY(-4px);
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #2c3e50;
      border-bottom: 4px solid #3498db;
      padding-bottom: 0.75rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    h1 span {
      background: #3498db;
      color: white;
      font-size: 1.2rem;
      padding: 0.2rem 0.6rem;
      border-radius: 30px;
      margin-left: auto;
      font-weight: 400;
    }

    form {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    input {
      flex: 1 1 200px;
      padding: 0.8rem 1.2rem;
      font-size: 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 50px;
      transition: border-color 0.3s, box-shadow 0.3s;
      outline: none;
      background: #fafafa;
    }

    input:focus {
      border-color: #3498db;
      box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.15);
      background: white;
    }

    button {
      padding: 0.8rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
    }

    button:hover:not(:disabled) {
      background: #2980b9;
      transform: scale(1.02);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: none;
    }

    #result {
      background: #f8f9fa;
      padding: 1.25rem 1.5rem;
      border-radius: 16px;
      border-left: 6px solid #3498db;
      min-height: 80px;
      transition: all 0.3s;
      margin-top: 1rem;
      line-height: 1.6;
      color: #2c3e50;
    }

    #result .valid {
      color: #27ae60;
      font-weight: 700;
      font-size: 1.1rem;
    }

    #result .invalid {
      color: #e74c3c;
      font-weight: 700;
      font-size: 1.1rem;
    }

    #result .info {
      display: block;
      margin-top: 0.25rem;
    }

    #result .error {
      color: #e67e22;
    }

    #result .loading {
      color: #3498db;
      font-weight: 500;
    }

    /* Small screen adjustments */
    @media (max-width: 480px) {
      .container {
        padding: 1.5rem;
      }
      h1 {
        font-size: 1.5rem;
        flex-wrap: wrap;
      }
      h1 span {
        margin-left: 0;
      }
      input, button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      📞 Phone Validator
      <span>v1.0</span>
    </h1>

    <form id="phoneForm">
      <input type="text" id="phoneInput" placeholder="e.g. +254703903056" required>
      <button type="submit" id="submitBtn">Validate</button>
    </form>

    <div id="result">Enter a number and click Validate.</div>
  </div>

  <!-- External script -->
  <script src="/script.js"></script>
</body>
</html>
